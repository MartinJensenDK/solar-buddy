name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests
        run: pytest --cov=custom_components.solar_buddy --cov-report=term-missing
